<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微觀戰爭：免疫防線 - 競技生存版</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #030000; overflow: hidden; 
            touch-action: none; position: fixed;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas { display: block; }
        
        #ui { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            font-size: 22px; font-weight: 700; color: #00ffcc;
            text-shadow: 2px 2px 8px #000; pointer-events: none; z-index: 10;
        }

        /* 高對比度遊戲結束彈窗 */
        .overlay {
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: #1a1a1a; 
            padding: 30px; border: 4px solid #00ffcc; 
            border-radius: 20px; text-align: center; z-index: 100; 
            width: 85%; max-width: 320px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
        }

        .menu-btn {
            display: block; width: 100%; margin: 15px 0; padding: 18px;
            background: #2d2d2d; color: #ffffff; border: 2px solid #555;
            border-radius: 12px; cursor: pointer; font-size: 18px; 
            font-weight: 800; transition: 0.2s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        
        .menu-btn:hover { 
            background: #00ffcc; color: #000; border-color: #fff;
            box-shadow: 0 0 20px #00ffcc;
        }
        
        .share-btn { background: #25D366; color: white; border: none; margin-top: 20px; }
        .score-display { font-size: 42px; color: #ffcc00; font-weight: 900; display: block; margin: 10px 0; }
        h2 { color: #00ffcc; margin: 0 0 10px 0; }
        p { color: #ccc; }
    </style>
</head>
<body>

    <div id="ui">🛡️ 免疫強度: <span id="score">0</span> | ⏳ 持續時間: <span id="timeDisplay">0</span>s</div>
    
    <div id="gameOverPanel" class="overlay">
        <h2>💀 系統崩潰</h2>
        <p>最終免疫評分</p>
        <span id="finalScore" class="score-display">0</span>
        <p>歷史最強抗體: <span id="bestScore" style="color: #00ffcc;">0</span></p>
        <button class="menu-btn" onclick="location.reload()">重新啟動</button>
        <button class="menu-btn share-btn" onclick="shareToWhatsApp()">📢 分享到 WhatsApp</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const timeEl = document.getElementById('timeDisplay');

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

const assets = {
    player: new Image(), enemy: new Image(),
    bullet: new Image(), bg: new Image()
};
assets.player.src = 'assets/player.png';
assets.enemy.src = 'assets/enemy.png';
assets.bullet.src = 'assets/bullet.png';
assets.bg.src = 'assets/background.png'; 

// 遊戲邏輯變數 (數值已固定，無升級)
let isPaused = false;
let score = 0;
let gameSeconds = 0;
let keys = {};
let touchX = null, touchY = null;

// --- ⚙️ 固定數值平衡 (鎖定爽快但具挑戰性的射速) ---
let shootProb = 0.05;      // 射擊機率平衡 (維持流暢但不無敵)
let shakeTime = 0;
let player = { x: canvas.width/2, y: canvas.height/2, r: 23, speed: 5.5 };
let enemies = [];
let bullets = [];

// --- 难難度系統：無上限的指數級增長 ---
let enemySpawnInterval = 1000; // 初始 1 秒生一隻

// 時間與難度計時器
setInterval(() => {
    if (!isPaused) {
        gameSeconds++;
        timeEl.innerText = gameSeconds;
        // 每 5 秒加速敵人生成速度，指数级提升，沒有上限
        enemySpawnInterval = Math.max(80, 1000 * Math.pow(0.88, gameSeconds / 5));
    }
}, 1000);

// 循環生成敵人
function spawnLoop() {
    if (!isPaused) spawnEnemy();
    setTimeout(spawnLoop, enemySpawnInterval);
}
spawnLoop();

// 控制 (鍵盤+觸控)
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchend', () => { touchX = null; touchY = null; });

function handleGameOver() {
    isPaused = true;
    let savedBest = localStorage.getItem('bctech_best_score') || 0;
    if (score > savedBest) { localStorage.setItem('bctech_best_score', score); savedBest = score; }
    document.getElementById('finalScore').innerText = score;
    document.getElementById('bestScore').innerText = savedBest;
    document.getElementById('gameOverPanel').style.display = 'block';
}

function shareToWhatsApp() {
    const text = `我在 BCTECH 《免疫防線》堅持了 ${gameSeconds} 秒，拿下 ${score} 分！無升級純技術競技，你能撐多久？🧬\n挑戰連結：${window.location.origin + window.location.pathname}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function spawnEnemy() {
    // 敵人移動速度隨時間增長
    let baseSpeed = 1.3 + (gameSeconds / 25); 
    enemies.push({
        x: Math.random() < 0.5 ? -30 : canvas.width + 30,
        y: Math.random() * canvas.height,
        r: 21,
        speed: baseSpeed
    });
}

function update() {
    if (isPaused) return;
    if (shakeTime > 0) shakeTime--;

    // 電腦 + 手機移動
    if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
    if (touchX !== null && touchY !== null) {
        let dx = touchX - player.x, dy = touchY - player.y, dist = Math.hypot(dx, dy);
        if (dist > 5) {
            let angle = Math.atan2(dy, dx);
            player.x += Math.cos(angle) * player.speed;
            player.y += Math.sin(angle) * player.speed;
        }
    }

    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

    // 固定智慧射擊 (鎖定最近敵人)
    if (enemies.length > 0 && Math.random() < shootProb) {
        let nearest = enemies[0], minDist = Math.hypot(nearest.x - player.x, nearest.y - player.y);
        enemies.forEach(e => { let d = Math.hypot(e.x - player.x, e.y - player.y); if (d < minDist) { minDist = d; nearest = e; } });
        let angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*12, vy: Math.sin(angle)*12 });
    }

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < -50 || b.x > canvas.width + 50 || b.y < -50 || b.y > canvas.height + 50) bullets.splice(i, 1);
    });

    enemies.forEach((e, i) => {
        let angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(angle) * e.speed; e.y += Math.sin(angle) * e.speed;

        // 子彈碰撞判定
        bullets.forEach((b, bi) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.r + 10) {
                enemies.splice(i, 1); bullets.splice(bi, 1);
                score += 10; scoreEl.innerText = score;
                shakeTime = 3; // 擊中時輕微震動
            }
        });
        
        // 玩家死亡判定 (優化碰撞半徑，防止誤判)
        if (e && Math.hypot(e.x - player.x, e.y - player.y) < player.r + e.r - 8) handleGameOver();
    });
}

function draw() {
    if (isPaused) return;
    ctx.save();
    if (shakeTime > 0) ctx.translate(Math.random()*4-2, Math.random()*4-2);

    ctx.fillStyle = "#030000"; // 更純粹的黑底
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (assets.bg.complete) {
        ctx.globalAlpha = 0.22; // 背景調暗以專注遊戲
        ctx.drawImage(assets.bg, 0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0;
    }

    ctx.drawImage(assets.player, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    enemies.forEach(e => ctx.drawImage(assets.enemy, e.x - e.r, e.y - e.r, e.r*2, e.r*2));
    bullets.forEach(b => ctx.drawImage(assets.bullet, b.x - 12, b.y - 12, 24, 24));

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
